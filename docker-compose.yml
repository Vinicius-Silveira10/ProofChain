version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: proofchain-postgres
    restart: always
    environment:
      POSTGRES_USER: proofchain
      POSTGRES_PASSWORD: senha123
      POSTGRES_DB: proofchain_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    driver: local
